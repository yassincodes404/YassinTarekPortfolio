# Development Docker Compose — live-reload, no rebuild needed
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./app:/app/app              # bind-mount source code (live changes)
      - portfolio_data:/data        # persistent data volume
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  portfolio_data:
