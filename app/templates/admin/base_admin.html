<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — Portfolio Admin</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SortableJS for drag-and-drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    {% block head_extra %}{% endblock %}
</head>

<body class="admin-body">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <h2>Portfolio<span style="color:var(--admin-accent);">.</span></h2>
            <span>Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a href="/admin" class="{% if active_page == 'dashboard' %}active{% endif %}">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="/admin/projects" class="{% if active_page == 'projects' %}active{% endif %}">
                <span class="icon">📁</span> Projects
            </a>
            <a href="/admin/media" class="{% if active_page == 'media' %}active{% endif %}">
                <span class="icon">🖼️</span> Media Library
            </a>
            <a href="/admin/pages" class="{% if active_page == 'pages' %}active{% endif %}">
                <span class="icon">📄</span> Pages
            </a>

            <div class="nav-section">Settings</div>
            <a href="/admin/settings" class="{% if active_page == 'settings' %}active{% endif %}">
                <span class="icon">⚙️</span> Site Settings
            </a>
            <a href="/admin/revisions" class="{% if active_page == 'revisions' %}active{% endif %}">
                <span class="icon">🔄</span> Revisions
            </a>
            <a href="/admin/activity" class="{% if active_page == 'activity' %}active{% endif %}">
                <span class="icon">📋</span> Activity Log
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" target="_blank">🌐 View Site</a>
            <a href="/admin/export" style="margin-top:0.5rem;">📦 Export Data</a>
            <a href="/admin/logout" style="margin-top:0.75rem;color:var(--admin-danger);">🚪 Logout</a>
        </div>
    </aside>

    <!-- Main content -->
    <div class="admin-main">
        {% block content %}{% endblock %}
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Admin JS -->
    <script src="/static/js/admin.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
