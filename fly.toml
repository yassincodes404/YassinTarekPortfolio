app = "yassin-tarek-portfolio"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  # Fly will use your Dockerfile at repo root

[env]
  DATA_DIR = "/data"
  UPLOAD_DIR = "/data/uploads"
  SECRET_KEY = "replace_with_random_string"       # For admin session cookies
  ADMIN_EMAIL = "your.email@example.com"          # Admin login email
  ADMIN_PASSWORD = "StrongPassword123!"          # Admin login password
  BASE_URL = "https://yassin-tarek-portfolio.fly.dev"
  LOG_LEVEL = "INFO"

[[mounts]]
  source = "portfolio_data"
  destination = "/data"

[http_service]
  # FastAPI must listen on this port dynamically
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"